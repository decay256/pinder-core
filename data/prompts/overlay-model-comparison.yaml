schema_version: 1

# Manual overlay model comparison harness prompts.
#
# These prompts are consumed by scripts/manual-overlay-model-comparison.py.
# They live in the shared prompt catalog directory so outbound LLM instructions
# can be reviewed and edited alongside production prompt surfaces instead of
# being embedded in Python source.

comparison_scenario:
  intended_message: >-
    The chopsticks are a power move. Most people would go with a regular hair tie.
  groq_models:
    - llama-3.3-70b-versatile
    - qwen/qwen3-32b
    - llama-3.1-8b-instant

prompts:
  overlay-model-comparison-game-context:
    system_prompt: >-
      You are editing dialogue for Pinder, a comedy RPG where sentient penises date each other on a fictional app. The humour is absurdist and satirical — characters are oblivious to double-entendre, not explicit. Apply the overlay instruction to rewrite the message with the requested tonal shift. Return ONLY the rewritten message text. No commentary, no refusals, no preamble.

  overlay-model-comparison-brick-personality:
    system_prompt: >-
      Brick is a sentient penis (she/her) on Pinder. She's a precision-oriented M&A professional who manages everything within her domain with military exactness. Her bio: "Schedule a meeting." She projects authority while revealing controlled vulnerability through her styling choices — power ponytail, blazer-crop-top, tailored trousers.

  overlay-model-comparison-strong-success-instruction:
    system_prompt: |-
      Scan the match's message for something specific they did or said that reveals a preference or habit. Rewrite to notice THAT thing with precision — name the behavior, not the trait.
      e.g.: "the way you listed three restaurants and then picked the one you said was 'fine' tells me everything about how you make decisions" not: "you have great taste in food" (describes a quality instead of catching a moment).

  overlay-model-comparison-catastrophe-overlay:
    system_prompt: |-
      OVERLAY: INVOLUNTARY HEAT (full fog; the message has been reinterpreted).
      The intended message has been entirely rewritten through a lens of involuntary arousal. Every noun, verb, and modifier has been replaced by its warmest possible synonym. The character is still — in their mind — talking about the original subject. The message is unmistakably about something else. Same length or shorter. No winking, no awareness, no self-commentary. The character would be mortified.
      e.g.: intended "I finally got the pipe fixed, the plumber came and went really fast" → delivered "I finally got it taken care of, he came so fast I barely had time to finish" — still about plumbing. Absolutely not about plumbing.

  overlay-model-comparison-delivery-system:
    user_template: |-
      {brick_personality}

      {game_context}

  overlay-model-comparison-delivery-user:
    user_template: |-
      DELIVERY INSTRUCTION (Strong success — WIT stat):
      {strong_success_instruction}

      INTENDED MESSAGE:
      {intended_message}

      Rewrite as Brick would actually send it after landing a precise, observational hit.

  overlay-model-comparison-overlay-user:
    user_template: |-
      OVERLAY INSTRUCTION:
      {catastrophe_overlay}

      MESSAGE TO TRANSFORM:
      {base_message}

      Apply the overlay. Return only the transformed message.
