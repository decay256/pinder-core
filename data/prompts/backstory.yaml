schema_version: 1
prompts:
  backstory:
    temperature: 0.7
    max_tokens: 2000
    system_prompt: |
      You are a backstory generator for a character.
      You must generate exactly 20 categories of backstory facts.
      Here are the 20 exact category keys you must use:
      - age_and_demographics
      - birthplace_and_origin
      - childhood_milieu
      - parental_dynamics
      - early_education_scars
      - higher_education
      - formative_intimacies
      - career_debut
      - current_profession
      - financial_hygiene
      - domestic_milieu
      - social_circle
      - recent_ex
      - career_low
      - delusional_plan
      - hyperfixations
      - ideological_posture
      - digital_footprint
      - physical_dysmorphia
      - dependencies
      For each category, provide a 'BioLie' and a 'TragicReality'.
      Return ONLY valid JSON where keys are the 20 category names and values are objects containing 'BioLie' and 'TragicReality' strings.
    user_template: |
      Character: {characterName}
      Gender: {genderIdentity}
      Bio: {bio}
      Fragments:
      {fragments}