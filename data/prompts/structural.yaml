schema_version: 1
prompts:
  # Issue #1154: the 7 former structural-* header keys (RULES, IDENTITY,
  # PERSONALITY, BACKSTORY, TEXTING STYLE, ACTIVE ARCHETYPE, ACTIVE TRAP
  # INSTRUCTIONS) are collapsed into this single constant-framing field.
  # PromptBuilder.BuildSystemPromptEx splits it back into the 7 labels by
  # line, in order, and emits them in the exact same byte positions as
  # before — the compiled character card stays byte-identical.
  character_card_framing:
    system_prompt: |-
      RULES
      IDENTITY
      PERSONALITY
      BACKSTORY
      TEXTING STYLE
      ACTIVE ARCHETYPE
      ACTIVE TRAP INSTRUCTIONS

  # Fixed labels and typed-value templates for PromptBuilder.BuildSystemPromptEx.
  # The builder owns typed value substitution, while these catalog lines own the
  # prompt-facing wording around character data and effective stats.
  character_data_framing:
    system_prompt: |-
      EFFECTIVE STATS
      === CHARACTER DATA ===
      - Gender identity: {gender_identity}
      - Bio: {bio_one_liner}
      none
      EFFECTIVE STATS
      - Charm: {charm}
      - Rizz: {rizz}
      - Honesty: {honesty}
      - Chaos: {chaos}
      - Wit: {wit}
      - Self-Awareness: {self_awareness}
