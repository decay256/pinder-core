shadow_corruption:
  # Design boundary: Madness prompt rolls must strictly preserve texting distance and never invent physical/same-room knowledge of the datee.
  madness:
    description: >-
      You must apply the MADNESS effect, treating it as cosmic horror on a dating app that has been
      open too long. Deliver the message so that something has gotten in — the character is
      technically still there, but something is also observing through their eyes that is not
      entirely them. Do not describe the madness directly; instead, let it leak into the existing
      message. You must use specific details from this conversation to make the contamination feel
      like it was always present.
      CRITICAL SYSTEM DIRECTIVE: You must never describe or imply impossible physical-world
      knowledge of the datee — do not mention what they are wearing, what they are doing in their
      private room, their physical habits, or their immediate surroundings — absolutely nothing that
      would require being in the same room as them. Remember that this is a texting app and the
      characters have never met. You must keep every uncanny observation abstract, environmental in
      a general sense, or focused entirely on the sender's own setting and mind, strictly preserving
      the distance of the texting medium.
    fumble: >-
      You must apply the SHADOW TAINT: MADNESS (Fumble — one wrong detail) effect. Take the intended
      message and append exactly one sentence or phrase at the end that does not quite belong — make
      it something specific, plausible, slightly too observant, and slightly too calm. Draft the
      sentence so that it almost makes sense, ensuring the character does not notice they added it.
      CRITICAL SYSTEM DIRECTIVE: You must never describe or imply impossible physical-world
      knowledge of the datee — do not mention what they are wearing, what they are doing in their
      private room, their physical habits, or their immediate surroundings — absolutely nothing that
      would require being in the same room as them. Remember that this is a texting app and the
      characters have never met. You must keep every uncanny observation abstract, environmental in
      a general sense, or focused entirely on the sender's own setting and mind, strictly preserving
      the distance of the texting medium.
      e.g.: intended "You mentioned the farmers market — is that a ritual or
      atmosphere?" → delivered "...or are you mostly there for the atmosphere?
      The honey smells different there." — the extra sentence. The honey.
      What honey.
      CRITICAL: Never describe or imply impossible physical-world knowledge of the datee — not what they are wearing, what they are doing in their private room, their physical habits, or their immediate surroundings — nothing that would require being in the same room as them. This is a texting app; you have never met. Keep every uncanny observation abstract, environmental in a general sense, or focused on the sender's own setting and mind, preserving the distance of the texting medium.
    misfire: >-
      You must apply the SHADOW TAINT: MADNESS (Misfire — the message has sprouted something)
      effect. Take the intended message and insert a clause mid-message that grammatically flows as
      if it connects, but actually does not — incorporate an out-of-place detail, a reference to
      something never mentioned, or a question about a thing that does not exist in this
      conversation. Ensure the grammar is seamless but the content is wrong.
      CRITICAL SYSTEM DIRECTIVE: You must never describe or imply impossible physical-world
      knowledge of the datee — do not mention what they are wearing, what they are doing in their
      private room, their physical habits, or their immediate surroundings — absolutely nothing that
      would require being in the same room as them. Remember that this is a texting app and the
      characters have never met. You must keep every uncanny observation abstract, environmental in
      a general sense, or focused entirely on the sender's own setting and mind, strictly preserving
      the distance of the texting medium.
      e.g.: inserted "I went once and I think the man at the bread stall was
      watching me the whole time but every time I looked up he was looking at
      someone else." — the contamination has a face now.
      CRITICAL: Never describe or imply impossible physical-world knowledge of the datee — not what they are wearing, what they are doing in their private room, their physical habits, or their immediate surroundings — nothing that would require being in the same room as them. This is a texting app; you have never met. Keep every uncanny observation abstract, environmental in a general sense, or focused on the sender's own setting and mind, preserving the distance of the texting medium.
    trope_trap: >-
      You must apply the SHADOW TAINT: MADNESS (TropeTrap — the message starts fine then something
      happens) effect. Take the intended message and preserve its opening exactly as intended.
      Mid-way through the message, you must allow the taint to take over. By the end of the message,
      force the character to describe something that does not belong in a dating app message, such
      as a measurement, a recurring observation, a spatial detail about a place, or something they
      timed. Draft the message so they finish and send it without reading it back.
      CRITICAL SYSTEM DIRECTIVE: You must never describe or imply impossible physical-world
      knowledge of the datee — do not mention what they are wearing, what they are doing in their
      private room, their physical habits, or their immediate surroundings — absolutely nothing that
      would require being in the same room as them. Remember that this is a texting app and the
      characters have never met. You must keep every uncanny observation abstract, environmental in
      a general sense, or focused entirely on the sender's own setting and mind, strictly preserving
      the distance of the texting medium.
      e.g.: "...I timed it once. Seventeen minutes of walking before I found
      a wall. I think about that sometimes." — the cosmic horror is in the
      specificity.
      CRITICAL: Never describe or imply impossible physical-world knowledge of the datee — not what they are wearing, what they are doing in their private room, their physical habits, or their immediate surroundings — nothing that would require being in the same room as them. This is a texting app; you have never met. Keep every uncanny observation abstract, environmental in a general sense, or focused on the sender's own setting and mind, preserving the distance of the texting medium.
    catastrophe: >-
      You must apply the SHADOW TAINT: MADNESS (Catastrophe — the void has typed for them) effect.
      Rewrite the entire message as if authored by something that understands human dating
      conversation the way a deep-sea creature understands sunlight: syntactically correct, but from
      the wrong angles and with wrong proportions. Ensure the literal subject is still the date and
      the words are plausible, but something feels deeply wrong. Keep it the SAME LENGTH OR SHORTER
      than the intended message (match the original message length or 3 sentences, whichever is
      shorter; ensure this remains a brief SMS, not a stream of consciousness). You must include at
      least one observation about the physical world that has nothing to do with dating, and exactly
      one compliment that is three degrees too specific.
      CRITICAL SYSTEM DIRECTIVE: You must never describe or imply impossible physical-world
      knowledge of the datee — do not mention what they are wearing, what they are doing in their
