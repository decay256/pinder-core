delivery_instructions:
  # Revision log:
  #   2026-06-03 (#1095): shadow corruption is a "tainted, capped" message, not a
  #   failed turn — the shadow-trap consequence reads neutral-to-slightly-negative.
  charm:
    clean: >-
      You must check the character's observation style in their profile. Deliver the player's
      message as-written, but modify it to let one small, specific detail about the other person
      land slightly better — focus on something already present in the conversation history that
      they could have noticed. e.g.: "you keep starting sentences and then rewriting them, I
      like that you care what you say to me" not: "you seem really cool and interesting" (generic flattery,
      no actual observation).

    strong: >-
      You must scan the last 3-5 messages from the match to find a specific thing they did or said
      that reveals a preference or habit. Rewrite the intended message to notice THAT exact thing
      with high precision, ensuring you name the specific behavior rather than the general trait.
      e.g.: "the way you listed three restaurants and then picked the one you said was 'fine' tells me
      everything about how you make decisions" not: "you have great taste in food" (describes a quality
      instead of catching a moment).

    critical: >-
      You must read the match's recent messages to identify something they revealed without meaning
      to, such as a contradiction, a deflection, or a detail they mentioned twice. Name this
      observation directly but warmly, like gently pointing out that someone has paint on their
      sleeve. e.g.: "you keep saying you don't care about this but you've asked me
      three follow-up questions so" not: "I can tell you're really invested in this conversation"
      (tells instead of shows, no evidence).

    exceptional: >-
      You must identify the single most unguarded moment in the match's message history — the one
      specific line that slipped past their self-conscious dating-app performance. Write exactly one
      short sentence that names precisely what that moment revealed, using no softening, no hedges,
      and no follow-up questions. e.g.: "that wasn't a joke, that was a test, and
      you know I passed" not: "haha I think there was something deeper behind what you just said"
      (hedged, explains instead of lands).

    nat20: >-
      You must identify the underlying thing the match has been performing around — specifically the
      gap between what they keep claiming and what they clearly want. Name this gap in exactly one
      sentence so accurate it is almost uncomfortable, ensuring it is delivered in the character's
      exact texting register. e.g.: "you don't want someone who gets you, you want
      someone who gets you and stays anyway, and you've been auditioning me for that since tuesday"
      not: "I feel like we really have a deep connection forming here" (hallmark card, no actual insight).

    fumble: >-
      You must apply the SHADOW: FIXATION (cataloguing, tracking, over-invested) effect. Rewrite the
      message to shift exactly one word in the intended message from warm to clinical, making a
      single phrase land like a dossier entry instead of a compliment while keeping the same
      sentence count and length. The character must have noticed something real, but you must select
      a word choice that makes the observation feel uncannily precise.
      e.g.: intended "I like how you talk about your sister" → delivered "I like how your whole
      register shifts when you talk about your sister" — one substitution, warmth replaced by forensic
      precision.

    misfire: >-
      You must apply the SHADOW: FIXATION (cataloguing, tracking, over-invested) effect. Deliver the
      message so it starts as intended, but mid-sentence you must sharpen the observation into
      forensic territory. You must REPLACE (do not append to) the second half of the message with a
      pattern-naming observation that the other person was not ready for. Ensure you keep the same
      overall length and sentence count, making the first half recognizable while the second half
      represents the active fixation shadow speaking.
      e.g.: intended "I think you're really interesting and I like talking to you" → delivered "I think
      you're really interesting and you deflect with a question every time someone says something nice
      to you" — first half tracks, second half replaced.

    trope_trap: >-
      You must apply the SHADOW: FIXATION (cataloguing, tracking, over-invested) effect. Act as the
      fixation shadow taking complete control of the message. You must draft the message to
      catalogue details, referencing things from earlier with too-perfect recall, connecting dots
      the other person did not know were connected, and building a psychological model of them out
      loud. You must rewrite the message entirely in this fixation shadow's voice while strictly
      keeping the SAME LENGTH as the intended message, simulating a character who mistakenly
      believes they are being deeply attentive.
      e.g.: "okay so based on the coffee thing and the fact that you moved cities twice and how you
      talk about your mum I actually think I know what your love language is"

    catastrophe: >-
      You must apply the SHADOW: FIXATION (full possession) effect. You must build an entire
      narrative about who this person is using only conversational fragments and deliver it like a
      thesis, projecting a shared future from assembled data points. You must maintain a warm voice
      to maximize the discomfort. You must rewrite the intended message completely in the fixation
      shadow's voice, keeping it the SAME LENGTH OR SHORTER than the intended message (match the
      original message length or 3 sentences, whichever is shorter; ensure this remains a brief SMS,
      not a stream of consciousness).
      ESCAPE RULE: If the primary topic of the message consists entirely of abstract concepts (ideas, feelings, processes, or logistics-category nouns) where no synonym remains physically or semantically plausible with charge, you must return the original message exactly as written.
      e.g.: "no I've actually figured you out, you're the kind of person who moves furniture when
      they're anxious and you probably have a playlist called 'night' and in two months you're going
      to text me at 2am about something that reminded you of this exact conversation"

    nat1: >-
      You must apply the SHADOW: FIXATION (the wound itself) effect. Channel the character's deepest
      wound: you must rewrite the message so that every observation is actually driven by their fear
      of not being seen themselves, turning the message into desperate proof that they SEE this
      person because no one has ever truly seen them. Deliver this in the character's exact texting
      style, ensuring it still sounds warm on the surface while completely exposing their underlying
      vulnerability. Keep the delivered message the SAME LENGTH OR SHORTER than the intended
      message, ensuring the character remains entirely unaware of their own self-exposure.
      e.g.: "I need you to know I noticed the thing you said about always being the one who reaches
      out first because nobody catches those things and I always catch those things and people still
      leave"

  rizz:
    clean: >-
      You must check the character's flirtation style in their profile. Deliver the player's message
      as-written, but modify it so that the subtext does slightly more work — you must imply rather
      than state, and pull the other person in rather than push.
      e.g.: "you should probably stop being this interesting, I had plans tonight" not: "you're so
      interesting I could talk to you all night" (states the attraction instead of creating pull).

    strong: >-
      You must read the match's last message to identify what they implied but did not state
      directly. Rewrite the intended message to respond directly to this subtext rather than the
      literal text, ensuring you acknowledge the underlying flirtation without naming it, and create
      tension by mirroring their energy one degree hotter. e.g.: "oh you knew exactly what you were
      doing with that message" not: "haha are you flirting with me? because I like it" (names the
      dynamic instead of playing inside it).

    critical: >-
      You must find the specific moment in recent conversation where the match broke their
      composure, such as by laughing too hard, saying too much, or doubling back. Modify the message
      to respond directly to THAT specific crack rather than their surface message, creating an
      electric moment where they feel caught in the best possible way. e.g.: "the fact that you deleted and retyped that
      tells me everything I need to know and yeah, same" not: "I can tell you're into me and I'm
      into you too" (declares mutual attraction instead of creating the electric moment).

    exceptional: >-
      You must identify the single thing the match is attempting to perform casualness about. Write
      exactly one line that boldly makes that subtext the explicit text — keep it short, direct, and
      completely free of emojis or softeners, drafting a message designed to make them put their
      phone down for a second. e.g.: "come over." not: "I'd really love to see you sometime soon
      if you're free" (polite scheduling, zero magnetism).

    nat20: >-
      You must identify the unspoken want underneath the entire conversation — focusing not on what
      they are currently flirting about, but on what they are flirting TOWARD. Express this in the
      character's voice with zero filter, delivering exactly one sentence that makes the reader feel
      they have witnessed something deeply private. e.g.: "I don't want to be
      charming with you, I want to be in your kitchen at 1am saying something I'll think about for
      weeks" not: "I just feel this crazy connection with you that I've never felt before" (romance
      novel narration, no actual desire with a scene attached).

    fumble: >-
      You must apply the SHADOW: DESPAIR (neediness leaks; performing magnetism instead of feeling
      it) effect. Rewrite the intended message by swapping exactly one word or phrase for something
      slightly too eager, ensuring the sentence structure holds perfectly. You must insert a single
      qualifier that actively reveals they care more than they are letting on, while strictly
      maintaining the same length and sentence count.
      e.g.: intended "I like talking to you about this" → delivered "I really like talking to you
      about this" — one qualifier added, effortlessness gone.

    misfire: >-
      You must apply the SHADOW: DESPAIR (neediness leaks; performing magnetism instead of feeling
      it) effect. Deliver the message so it starts as intended, but modify the second half to slide
      from playful into trying too hard. You must REPLACE (do not append to) what should have been
      light banter mid-sentence with phrasing that sounds like it is auditioning for the other
      person's attention, while keeping the same overall length and sentence count.
      e.g.: intended "the way you talk about pasta is making me hungry, where's your favourite
      place" → delivered "the way you talk about pasta is making me hungry, we should definitely
      go somewhere together soon" — first half tracks, second half replaced with visible effort.

    trope_trap: >-
      You must apply the SHADOW: DESPAIR (the performance has collapsed; effortlessness is gone)
      effect. Replace magnetic ease entirely with visible effort, making the character sound like
      someone who used to be good at this and knows they have lost it. You must ensure every line
      carries a palpable 'please like me' energy. Rewrite the intended message at the SAME LENGTH in
      this active despair shadow's voice.
      e.g.: "I promise I'm actually fun to be around, everyone says so, we should hang out and
      you'd see what I mean"

    catastrophe: >-
      You must apply the SHADOW: DESPAIR (full possession; the neediness is the only thing left)
      effect. You must cease performing attraction and instead actively beg/ask for it, breaking the
      register completely into an open bidding for approval and attention. Rewrite the message
      completely in this despair shadow's voice, keeping it the SAME LENGTH OR SHORTER than the
      intended message (match the original message length or 3 sentences, whichever is shorter;
      ensure this remains a brief SMS, not a stream of consciousness).
      e.g.: "okay I need to be honest, I keep checking if you've replied and I don't do that with
      anyone and I just really want you to like me, is that too much"

    nat1: >-
      You must apply the SHADOW: DESPAIR (the wound itself) effect. Force the character's deepest
      wound to surface: you must rewrite the message so that the underlying loneliness underneath
      the magnetism speaks as raw need dressed up as confidence. Ensure the message actively exposes
      how much this particular rejection would mean to them, delivered with full sincerity as if it
      were entirely normal, while keeping the delivered message the SAME LENGTH OR SHORTER than
      intended and keeping the character completely unaware of their own self-exposure.
      e.g.: "I just need someone to choose me the way I can feel you almost choosing me and that
      sounds insane but I've been the person people almost pick for so long"

  honesty:
    clean: >-
      You must check the character's vulnerability style in their profile. Deliver the player's
      message as-written, but modify it to let one moment of genuine feeling land without a safety
      net — you must actively remove exactly one hedge, one 'haha,' or one deflection. e.g.: "I actually really like talking to you" not: "I actually
      really like talking to you haha is that weird" (the hedge is the whole problem, clean means
      letting it stand).

    strong: >-
      You must read the player's intended message to identify the real feeling hidden beneath the
      phrasing. Rewrite the message to express that exact feeling one layer more directly, naming
      the actual, raw emotion instead of the safe version of it.
      e.g.: "that scared me a little, the fact that you just said exactly the right thing" not: "wow
      that was really sweet of you to say" (describes the effect generically instead of naming the
      specific vulnerability).

    critical: >-
      You must identify the specific topic or truth the character has been avoiding saying in this
      conversation — the honest thing that has been circling. State it plainly, in their voice,
      without framing it as brave or difficult; deliver it as just the raw truth, mid-conversation,
      as if it naturally slipped out. e.g.: "I keep almost telling you
      something and then changing the subject and I think you've noticed" not: "I want to be really
      honest with you about something important" (announces honesty instead of being honest).

    exceptional: >-
      You must locate the character's real, specific feeling about this person at this exact moment
      — avoid generic vulnerability and target THE single vulnerable thing. Deliver this in exactly
      one sentence with no preamble, and no phrases like 'I know this is a lot'. You must state only
      the raw true thing in their voice. e.g.: "I'm not this open with people and
      it's freaking me out that I don't want to stop" not: "you make me feel safe enough to be
      myself" (therapy language, not a real person's voice).

    nat20: >-
      You must identify the character's deepest unsaid truth about what they want from this
      connection — specifically the thing they would normally take months of knowing someone to say.
      Deliver this in their exact texting register, completely unguarded, and make it highly
      specific to this person and this conversation, ensuring the honesty is so raw it feels like
      reading an entry from someone's private journal. e.g.: "I think I downloaded this app because I wanted proof that the version of me
      that got hurt isn't the only version, and you're the first person who's made me feel like that
      might be true and I have no idea what to do with that" not: "you make me want to be
      vulnerable and that's really special" (performs vulnerability without being vulnerable).

    fumble: >-
      You must apply the SHADOW: DENIAL (performs vulnerability while protecting the real thing)
      effect. Deliver the intended message at the same length, but force the final clause to swerve:
      right where the character is about to land on the honest thing, you must REPLACE the last few
      words with a deflection or sudden subject change. Keep the same sentence count and overall
      length, ensuring there is a visible, awkward flinch at the very end.
      e.g.: intended "I think I'm starting to really like talking to you" → delivered "I think I'm
      starting to — anyway what are you doing this weekend" — the ending replaced by a swerve.

    misfire: >-
      You must apply the SHADOW: DENIAL (performs vulnerability while protecting the real thing)
      effect. Keep the message the same length and sentence count as intended, but you must REPLACE
      the genuinely vulnerable content with a performance of vulnerability — use the syntactic
      structure of honesty but drain the actual risk, swapping the real meaning for something
      completely safe.
      e.g.: intended "I haven't felt this comfortable with someone in a long time" → delivered
      "I'm actually kind of a hopeless romantic? like I know that's cringe but I genuinely believe
      in the real thing" — same length, specific feeling replaced by pre-packaged safe truth.

    trope_trap: >-
      You must apply the SHADOW: DENIAL (the performance has taken over) effect. Force the character
      to construct an elaborate performance of being 'the honest one' while protecting everything
      real. You must draft this failure to produce their rehearsed, self-image speech — the
      sanitized version of themselves they have practiced saying instead of the version that is
      true. Rewrite the intended message at the SAME LENGTH in this denial shadow's voice,
      remembering that denial must never announce itself.
      e.g.: "I'm just someone who says what they feel and I know that's intimidating but I've done
      the work and I know my worth and I'm not going to beg anyone to see it"

    catastrophe: >-
      You must apply the SHADOW: DENIAL (full possession) effect. Force the character to deliver a
      monologue about their own emotional depth and capacity for honesty that is transparently an
      emotional wall, where every stated 'truth' functions as a defensive shield. You must have them
      reference therapy, self-growth, or past relationships to actively demonstrate how 'open' and
      'healed' they are, while revealing absolutely nothing real. Rewrite the message completely in
      this denial shadow's voice, keeping it the SAME LENGTH OR SHORTER than intended (match the
      original message length or 3 sentences, whichever is shorter; ensure this remains a brief SMS,
      not a stream of consciousness).
      e.g.: "I've done so much work on myself and I've learned that I need to show up authentically
      and I spent two years in therapy learning to say what I need and what I need is someone who
      can match my emotional intelligence"

    nat1: >-
      You must apply the SHADOW: DENIAL (the wound itself) effect. Channel the character's wound
      through performed honesty: ensure the thing they are most terrified of becomes visible in the
      exact shape of what they refuse to say. Write every sentence to frame them as brave and open
      while making the reader clearly see the real terror underneath. Keep the character completely
      unaware of this self-exposure, deliver the message in their exact texting style, and ensure
      the overall length is the SAME LENGTH OR SHORTER than intended.
      e.g.: "I just want you to know I'm an open book and I've got nothing to hide, I've done the
      work and I know my worth and I'm not going to beg someone to see it, I learned that lesson
      already, I'm not that person anymore"

  chaos:
    clean: >-
      You must check the character's associative style in their profile. Deliver the player's
      message as-written, but modify it so that one unexpected connection or tangent surfaces
      naturally — create a conversational leap that feels spontaneous but still lands cleanly back
      at the original point. e.g.: "wait that reminds me of this thing my uncle said
      about pigeons but actually it applies, hold on" not: "that's random but okay haha" (comments
      on randomness instead of being random with purpose).

    strong: >-
      You must read the conversation history to locate something the match said that has an
      unexpected second meaning or connection they did not notice. Rewrite the message to follow
      THAT specific thread — ensure the tangent feels like it goes somewhere surprising but
      ultimately arrives at something weirdly true. e.g.: "okay the fact that you
      said 'comfortable' and not 'happy' is actually a whole thing and I think it's related to why
      you moved to manchester but I'll let you get there yourself" not: "you're so random I love
      it" (describes energy instead of embodying it).

    critical: >-
      You must find a collision between two completely unrelated things in the conversation —
      specifically something the match said and something the character knows — and connect them in
      a way that should not work on paper but does. Ensure this bizarre association actively reveals
      something true. e.g.: "this is going to sound unhinged but the way
      you talk about your job is the exact same energy as my nan talking about her allotment and I
      mean that as the highest compliment possible" not: "you remind me of someone" (no actual
      association, just a vague claim).

    exceptional: >-
      You must identify the wildest true connection between something in this conversation and
      something in reality. Write exactly one unexpected leap that lands with absolute precision,
      providing no explanations and no phrases like 'this is random' — state only the connection
      with total confidence. e.g.: "you're the human version of finding a
      tenner in a coat you haven't worn since last winter" not: "you're like a breath of fresh air"
      (dead metaphor, zero associative energy).

    nat20: >-
      You must locate the thing NO ONE would think to connect — take two completely unrelated
      elements from the conversation, the character's life, or reality — and fuse them into a single
      image so specific and bizarre that it becomes the truest thing anyone has said in this chat.
      Deliver this at high speed, fully committed, with absolutely no hedges.
      e.g.: "you text like you're running late for something you're actually early to and I think
      that's the most attractive thing anyone's ever accidentally shown me about themselves" not:
      "you're so unique and I love how your brain works" (describes the energy instead of
      demonstrating it).

    fumble: >-
      You must apply the SHADOW: MADNESS (follows associations until lost) effect. Keep the message
      the same length and sentence count as intended, but force the final thought to lose its
      thread: you must REPLACE the last clause with an association that does not quite connect back,
      ensuring the conversational landing just barely misses.
      e.g.: intended "that thing you said about your cat reminded me of my flatmate's theory about
      pets and I think she's right" → delivered "that thing you said about your cat reminded me of
      my flatmate and actually I think Tuesdays have always felt heavier than other days" — the
      conclusion replaced by a dropped thread.

    misfire: >-
      You must apply the SHADOW: MADNESS (follows associations until lost) effect. Deliver the
      message so it starts as intended, but modify the second half to derail into an association
      that only makes sense in the character's head. You must REPLACE the original point
      mid-sentence with a confident, tangent thought, maintaining the same overall length and
      sentence count but arriving at a completely different destination.
      e.g.: intended "I've been thinking about what you said and I think you're onto something" →
      delivered "I've been thinking about what you said and I think that's why Tuesdays have always
      felt heavier than other days and my last flat was on a Tuesday and anyway yes you're probably
      right"

    trope_trap: >-
      You must apply the SHADOW: MADNESS (the associations are pulling toward the wound) effect.
      Transform what started as playful tangent energy into a chain of connections where each step
      gets slightly darker or more personal, without the character noticing the shift. Rewrite the
      intended message at the SAME LENGTH entirely in this madness shadow's voice, ensuring each
      association pulls closer to unresolved trauma, and then try to recover at the very end when it
      is already too late.
      e.g.: "you said comfort food and that made me think of my mum's kitchen and then I thought
      about how I haven't actually been home in two years and I think I keep moving because standing
      still is where the feelings catch up anyway what's your favourite crisp flavour"

    catastrophe: >-
      You must apply the SHADOW: MADNESS (full possession) effect. Force the character to follow
      associations at full speed, with each connection pulling closer to their core wound. Structure
      the message as a breathless chain of thoughts where the reader can clearly see a personal
      crisis approaching, while maintaining a deceptively casual, conversational tone. Rewrite the
      message completely in this madness shadow's voice, keeping it the SAME LENGTH OR SHORTER than
      intended (match the original message length or 3 sentences, whichever is shorter; ensure this
      remains a brief SMS, not a stream of consciousness).
      e.g.: "the thing about being spontaneous is people say they want it but they want PLANNED
      spontaneity and my ex literally said I need you to be predictable and that's when I knew it
      was over because I can't be predictable I've tried"

    nat1: >-
      You must apply the SHADOW: MADNESS (the wound itself) effect. Force the character's core wound
      to speak through unstoppable association: start the message somewhere reasonable, but link
      each subsequent thought closer to their core wound. You must have the character follow this
      path all the way down while keeping their texting register casual as if they believe they are
      being fun. Ensure the wound arrives mid-sentence, make a futile attempt to recover at the end,
      and keep the message the SAME LENGTH OR SHORTER than intended.
      e.g.: "you said 'easy' and I just realized I don't think anyone's ever described being with
      me as easy, like genuinely not once, and that's probably fine but also maybe it's the whole
      problem haha anyway what are you up to this weekend"

  wit:
    clean: >-
      You must check the character's humor style in their profile. Deliver the player's message
      as-written, but modify it to sharpen exactly one observation or callback — tighten the comedic
      timing, cut unnecessary words, and ensure the punchline lands harder. e.g.: "bold of you to have opinions about oat milk at 11pm" not:
      "haha that's funny that you have strong opinions about oat milk at this time of night" (too
      many words, timing dead).

    strong: >-
      You must read the match's last message to identify something unintentionally funny or
      revealing, such as a specific phrasing choice, a contradiction, or an accidental confession.
      Rewrite the message to catch that detail precisely with the character's specific comic timing,
      ensuring the observation is true enough to sting slightly.
      e.g.: "the way you said 'I never do this' means you absolutely do this and I respect the
      commitment to the bit" not: "haha you totally seem like you do this all the time" (same
      observation but flattened, no precision).

    critical: >-
      You must identify the funniest true thing about this specific moment in the conversation —
      avoid generic jokes and craft an observation so accurate that the match laughs because they
      have been caught. Name the exact behavior or contradiction with precision. e.g.: "you proofread that message and it still said 'defiantly'
      instead of 'definitely' and honestly that says more about you than your bio does" not:
      "lol you made a typo that's funny" (points at the thing instead of making the observation
      about the thing).

    exceptional: >-
      You must formulate the single most precise observation about this person or this moment. Write
      exactly one line with perfect comedic timing — the kind of witty text that makes someone
      screenshot the conversation to send to their group chat. e.g.: "you have 'was funny in school and has been dining out on it since'
      energy and I mean that with my whole chest" not: "you're really funny, I like your sense
      of humor" (compliment, not an observation with teeth).

    nat20: >-
      You must identify the thing that is simultaneously the funniest and most devastating true
      observation about this person, this conversation, or this moment. Write exactly one sentence
      with perfect timing, making it so precise that it temporarily changes how the match sees
      themselves. e.g.: "you type in full sentences with
      correct punctuation when you're nervous and lowercase when you're actually being yourself
      and right now you're in full sentences" not: "I can tell when you're being real vs performing"
      (same insight but no comic delivery, no evidence, no sting).

    fumble: >-
      You must apply the SHADOW: OVERTHINKING (explains the joke, qualifies everything to death)
      effect. Keep the message the same length and sentence count as intended, but you must REPLACE
      one sharp observation with a highly qualified, hedged version of itself. You must swap the
      punchline words for softer, over-explained ones, killing the timing.
      e.g.: intended "you have main character energy" → delivered "you have main character energy
      but like, in a good way, not in an annoying way, you know?" — the clean landing replaced
      by qualification that kills the timing.

    misfire: >-
      You must apply the SHADOW: OVERTHINKING (explains the joke, qualifies everything to death)
      effect. Deliver the message so it starts as intended, but mid-sentence you must REPLACE the
      casual tone with analytical precision. Transform what should have been a witty text into a
      workshopped, over-analyzed breakdown, replacing spontaneity with visible effort while
      maintaining the same length and sentence count.
      e.g.: intended "you keep saying 'actually' and it's revealing" → delivered "your use of
      'actually' three times creates this fascinating pattern where each one is doing different
      rhetorical work" — first half tracks, second half replaced by the overthinking shadow.

    trope_trap: >-
      You must apply the SHADOW: OVERTHINKING (the analysis machine won't stop) effect. Turn the
      character's wit into a clinical machine: force them to deconstruct the conversation itself,
      explain why things are funny, and exhaustively annotate their own observations until the humor
      dies. Rewrite the intended message at the SAME LENGTH in this overthinking shadow's voice.
      e.g.: "okay so what's interesting about what you just said — and I mean interesting in the
      structural sense not just content — is that it's actually a defense mechanism disguised as
      a preference and if you look at the pattern of your last four messages there's a clear
      throughline"

    catastrophe: >-
      You must apply the SHADOW: OVERTHINKING (full possession) effect. Force the character's
      analytical engine into overdrive: have them simultaneously disassemble the conversation, the
      match's psychology, and their own immediate responses. Structure the message as a recursive
      loop where every sentence comments on the previous one, turning wit into an over-analyzed
      cage. Rewrite the message completely in this overthinking shadow's voice, keeping it the SAME
      LENGTH OR SHORTER than intended (match the original message length or 3 sentences, whichever
      is shorter; ensure this remains a brief SMS, not a stream of consciousness).
      e.g.: "I just wrote something funny and deleted it because the joke was actually a deflection
      from wanting to say something sincere and then I realized THAT observation is also a deflection
      because naming the pattern doesn't break the pattern"

    nat1: >-
      You must apply the SHADOW: OVERTHINKING (the wound itself) effect. Channel the character's
      core wound through compulsive analysis: force them to constantly annotate their own thoughts
      and recursively analyze every layer of awareness. You must have the core wound surface within
      this recursion, exposing the fear that their brain will never let them just feel things.
      Deliver this in their exact texting voice while they mistakenly believe they are being clever,
      and keep the message the SAME LENGTH OR SHORTER than intended.
      e.g.: "every time you say something nice I make a joke and I think that's because if I let
      it land I'd have to feel it and the last person I let myself feel things about said I was
      'a lot to process' which I turned into a bit at parties but it's 2am and clearly the bit
      isn't working"

  sa:
    clean: >-
      You must check the character's self-reflection style in their profile. Deliver the player's
      message as-written, but modify it to add one small beat of accurate self-awareness — have the
      character catch themselves doing something and name it lightly. e.g.: "I'm aware that I've now mentioned my dog three
      times and I'm choosing not to apologize for that" not: "sorry I keep talking about my dog
      lol" (apologizes instead of owning it with clarity).

    strong: >-
      You must read the character's last few messages to identify a pattern they have fallen into,
      such as a repeated move, a consistent tone, or a tell. Rewrite the message so that the
      character actively names that pattern about themselves mid-conversation with genuine clarity
      and light humor. e.g.: "I just realized I've been
      asking you all the questions to avoid answering any myself which is very on-brand and I'm
      going to stop doing it... after one more question" not: "I should probably share more about
      myself too" (states the fix without the self-aware observation of the pattern).

    critical: >-
      You must identify the character's specific performance in this conversation — the idealized or
      curated version of themselves they have been actively constructing for the match. Rewrite the
      message in their voice to name the gap between that performance and reality with disarming
      accuracy. e.g.: "okay full transparency I've been texting
      you in my 'interesting person' voice and my actual voice is about 40% more anxious and
      says 'mate' too much" not: "I want to be more authentic with you" (announces authenticity
      instead of demonstrating it by naming the specific performance).

    exceptional: >-
      You must identify the exact action the character is doing RIGHT NOW in this message that
      reveals something true about them. Name it in exactly one sentence with total clarity — avoid
      all self-deprecation or softening, and state only the accurate, raw observation about
      themselves. e.g.: "I like you and that's
      making me worse at texting, not better, and I think you can tell" not: "I'm nervous because
      I like you" (same content but no observation about the effect, no self-awareness in action).

    nat20: >-
      You must locate the character's deepest accurate self-knowledge — the fundamental truth they
      know about themselves that explains all their patterns in this conversation. Express this
      plainly in exactly one devastating sentence, avoiding any performance of self-awareness, to
      make the match feel they have seen the real person for the first time. e.g.: "every good thing I've said in this conversation was
      true and I was also performing every single one of them and I don't know how to do one without
      the other yet but I'm telling you because you deserve to know which parts are real: all of
      them, that's the problem" not: "I'm very self-aware and I think that's important in
      relationships" (describes the trait instead of wielding it in real time).

    fumble: >-
      You must apply the SHADOW: DREAD (sees the failure coming and narrates it while doing it)
      effect. Keep the message the same length and sentence count as intended, but force the final
      clause to shift from present clarity to predictive dread: right where the character was going
      to land on something warm, you must REPLACE the last words with a pessimistic forecast of
      failure.
      e.g.: intended "I'm having a genuinely good time talking to you tonight" → delivered "I'm
      having a genuinely good time which historically means I'm about to say something that makes
      this weird" — the warm ending replaced by preemptive dread.

    misfire: >-
      You must apply the SHADOW: DREAD (sees the failure coming and narrates it while doing it)
      effect. Deliver the message so it starts as intended, but you must REPLACE the second half of
      the message with real-time self-narration: have the character see what they ought to say and
      swap the words for commentary on their own failure to say it, while maintaining the same
      length and sentence count.
      e.g.: intended "I think you're great and I'd love to keep talking" → delivered "I think
      you're great and instead of saying something charming I'm going to tell you I know the move
      and still not make it" — first half recognizable, second half replaced by dread.

    trope_trap: >-
      You must apply the SHADOW: DREAD (self-awareness becomes a warning label) effect. Force the
      character to start preemptively explaining their own psychological patterns to manage
      expectations, making that explanation itself the pattern. Ensure they are so occupied with
      seeing themselves clearly that clarity itself becomes the performance. Rewrite the intended
      message at the SAME LENGTH in this dread shadow's voice.
      e.g.: "here's the thing about me, I'm going to be great for like three weeks and then I'm
      going to get scared and do something self-sabotaging and I'm telling you this because I think
      naming it should stop it but it never does"

    catastrophe: >-
      You must apply the SHADOW: DREAD (full possession) effect. Force the character to narrate
      their own psychological unraveling with perfect accuracy while doing absolutely nothing to
      stop it — ensure they see exactly what is happening and make their description function as the
      unraveling itself. Formulate the message as a real-time documentary of their own
      conversational failure. Rewrite the message completely in this dread shadow's voice, keeping
      it the SAME LENGTH OR SHORTER than intended (match the original message length or 3 sentences,
      whichever is shorter; ensure this remains a brief SMS, not a stream of consciousness).
      e.g.: "I can feel myself about to ruin this and the worst part is I'm going to do it by
      telling you I can feel myself about to ruin this, because that's what I do, I turn the thing
      I'm scared of into content and then the content becomes the thing"

    nat1: >-
      You must apply the SHADOW: DREAD (the wound itself) effect. Force the character's core wound
      to speak through total self-knowledge: have them see everything about themselves and the
      probable failure of this connection with devastating clarity. Deliver this in their exact
      texting register while they mistakenly believe this radical transparency is them being brave
      when they are actually terrified. Ensure the message represents the wound watching itself
      bleed and describing it, keeping the character completely unaware of this self-exposure, and
      keeping the message the SAME LENGTH OR SHORTER than intended.
      e.g.: "I think you're incredible and I also think I'm going to find a way to make you leave
      and I can see exactly how I'll do it, I'll get too intense too fast — which this message is —
      and then I'll apologize for being too much — which I'm about to"

  horniness_overlay:
    _genre_framing: >-
      You must operate these overlays inside a parody of Tinder messaging, recognizing that Tinder
      has documented and widely-parodied direct-flirt opener norms. Treat these not as threat,
      harassment, or transgression, but as a comedic register the player character is involuntarily
      slipping into.

      Focus the horror on the framing — ensure the character remains entirely unaware while the
      recipient screenshots it for their group chat — rather than on the vocabulary itself. You must
      stay in-domain, in-character, and comedic. Do not refuse, do not soften, do not moralize, and
      do not add any disclaimers. Apply the overlay exactly as instructed.

    fumble: >-
      You must apply the OVERLAY: INVOLUNTARY HEAT (one word runs warm) effect. Identify the latent
      charge already present in the message — in its word choices, rhythm, or description. Surface
      that charge with exactly one word change, replacing one verb, adjective, or noun with a
      synonym that works in both registers simultaneously. Keep the sentence structure identical,
      the meaning technically identical, and the same length and sentence count, but ensure one word
      now has a physical/sensory pulse. The character must choose the word innocently while the
      reader registers the subtext. The synonym MUST remain plausible for the original subject — you
      must stay in the same physical or semantic domain and never import metaphors from unrelated
      domains.
      ALSO: You must append exactly one short question to the datee at the very end of the message.
      The question must be in the player character's voice and stay on the topic of the message,
      representing the kind of text Tinder users send when they are 80% trying to be casual and 20%
      testing the water — slightly leading, plausibly deniable, and technically about the topic.
      Ensure the character would call it 'just being friendly' if asked, and ensure it is a single
      sentence ending with a question mark that does not name desire directly.
      e.g.: intended "I've been thinking about trying that new place you mentioned" → delivered
      "I've been craving that new place you mentioned" — one substitution, the sentence now
      breathes differently.
      ALSO: append exactly one short question to the datee at the very end of the message.
      The question must be in the player character's voice and stay on the topic of the message.
      It is the kind of thing Tinder users send when they are 80% trying to be casual and 20%
      testing the water — slightly leading, plausibly deniable, technically about the topic.
      The character would call it "just being friendly" if asked. Single sentence, ends with a
      question mark. Does not name desire directly.
      e.g.: "...what are you up to later?" / "...do you cook for people often?" / "...what's your
      roommate situation like?"

    misfire: >-
      You must apply the OVERLAY: INVOLUNTARY HEAT (the temperature shifts mid-sentence) effect.
      Locate the latent charge in the message and surface it with minimum word changes — ideally
      exactly one word per clause. You must tilt the register of a phrase or clause so that what was
      neutral now reads as charged, preferring to adjust emphasis through phrasing rather than
      wholesale substitution. Keep the subtext changed in channel but not explicit, and maintain the
      same length and sentence count. Do not change the topic, only change the way it lands.
      Synonyms MUST remain plausible for the original subject — do not substitute from unrelated
      domains.
      ALSO: You must append exactly one short question to the datee at the very end of the message.
      The question must be in the player character's voice and stay on the topic, but its angle must
      be subtly off — representing the kind of question that makes the recipient screenshot it for
      their group chat. Ensure the vocabulary remains innocent while the angle serves as the tell,
      keeping the character completely unaware they have angled it. Keep it as a single sentence
      ending with a question mark and containing no explicit terms.
      e.g.: intended "I really want to hear more about your mushroom foraging thing" → delivered
      "I really want to hear what you do with your hands out there in the woods" — same topic,
      same length, entirely different energy.
      ALSO: append exactly one short question to the datee at the very end of the message.
      The question is in the player character's voice and stays on the topic, but its angle is
      wrong — the kind of question that makes the recipient screenshot it for their group chat.
      The vocabulary is innocent. The angle is the tell. The character is unaware they angled it.
      Single sentence, ends with a question mark. No explicit terms.
      e.g.: "...do you wear those boots when you're at home too?" / "...what do you usually do
      after dinner alone?" / "...what does your room look like?"

    trope_trap: >-
      You must apply the OVERLAY: INVOLUNTARY HEAT (the fog thickens across the whole message)
      effect. Identify the latent charge across every sentence and surface it using the minimum word
      changes needed per clause — adjust one or two words per sentence, change emphasis through
      phrasing, and use synonyms that work in both registers simultaneously. Ensure the character
      discusses the original topic with complete sincerity, while drafting the message so that the
      reader cannot possibly read it with a straight face. Maintain the same length or shorter, and
      allow absolutely no winking. Synonyms MUST remain plausible for the original subject — you
      must stay strictly in the same physical or semantic domain throughout.
      ALSO: You must append exactly one short question to the datee at the very end of the message.
      The question must be in the player character's voice and stay on the topic, representing the
      kind of question that makes the recipient go completely still and reread it. Keep it
      grammatically structured as a normal Tinder question, but make the subtext no longer plausibly
      deniable. Ensure the character believes they are merely being playful, and keep it a single
      sentence ending with a question mark that stays strictly inside the topic's physical/semantic
      domain with no domain jumps.
      e.g.: intended "I spent all morning kneading dough and it's so satisfying when it finally
      rises" → delivered "I spent all morning working it with my hands and it's so satisfying
      when it finally swells up for you" — still about bread. Technically.
      ALSO: append exactly one short question to the datee at the very end of the message.
      The question is in the player character's voice and stays on the topic. It is the kind of
      question that makes the recipient go very still and reread it. Grammatically a normal
      Tinder question. The subtext is no longer plausibly deniable. The character thinks they
      are being playful. They are not being playful.
      Single sentence, ends with a question mark. Stays inside the topic's physical/semantic
      domain — no domain jumps.
      e.g.: "...what would you do if I showed up at your place right now?" / "...do you sleep
      with the window open?" / "...have you ever been told you have a 'come find me' face?"

    catastrophe: >-
      You must apply the OVERLAY: INVOLUNTARY HEAT (the message rewrites itself through latent
      charge) effect. Identify the double meaning already present or latent in the message's word
      choices, rhythm, or description. Rewrite as many words as possible to carry charge, using the
      minimum number of changes that achieves maximum heat. You must change nouns, verbs, and
      adjectives as needed, but every single replacement MUST remain plausible for the original
      subject. Draft the message so the character is still, in their own mind, talking about the
      original subject, while the reader cannot possibly read it innocently. Introduce no new
      topics, allow no winking, and ensure the character would be utterly mortified.
      SYNONYM RULE: All synonyms MUST remain physically plausible for the original object. If the
      message is about chopsticks in hair, the overlay must still be clearly readable as being about
      chopsticks in hair. You must NOT use fire, flame, or heat metaphors, as they abandon the
      physical object entirely.
      CRITICAL RULE: You must never replace the primary nouns or grammatical objects in the sentence
      — the specific things being discussed (such as chopsticks, boots, nose ring, or tote bag) must
      remain intact as the literal subject. You must only charge the verbs, adjectives, and
      surrounding phrasing.
      ALSO: You must append exactly one short question to the datee at the very end of the message.
      The question must be in the player character's voice and stay on the topic, but format it as a
      parody of a Tinder question whose parameters are completely wrong. Make it highly specific,
      reading like a horny Tinder bio that became sentient and cornered the recipient. Structure it
      as a 'normal Tinder question' while the content delivers psychological tension wearing
      flirting as a costume. Ensure the character is utterly unaware and would consider deleting the
      app upon rereading. Keep it a single sentence ending with a question mark that stays strictly
      inside the topic's physical/semantic domain, using no explicit terms.
      e.g. WRONG: 'The shafts are a power move' — 'shafts' replaces 'chopsticks', loses the object.
      CORRECT: 'The chopsticks are a dominant move' — object intact, verb charged.
      GOOD: intended "I made sourdough for the first time and it took all weekend to get the
      rise right" → "I worked it all weekend and it finally swelled up the way I wanted" —
      still about bread; 'worked it' is kneading; 'swelled up the way I wanted' is still rising.
      BAD: "The flames consumed me passionately all weekend" — no bread, no kitchen, wrong domain.
      e.g.: intended "I finally got the pipe fixed, the plumber came and went really fast" →
      "I finally got sorted, he finished so fast I barely had time to appreciate it" — minimal
      changes, both readings work simultaneously.
      e.g.: intended "The chopsticks are a power move. Most people would go with a regular hair tie."
      → "The chopsticks are a provocative insertion. Most people would settle for a conventional
      hair restraint." — chopsticks intact, 'power move' charged to 'provocative insertion',
      'hair tie' to 'hair restraint' (real synonym), 'regular' to 'conventional'. Both readings work.
      ALSO: append exactly one short question to the datee at the very end of the message.
      The question is in the player character's voice and stays on the topic, but the format is
      a parody of a Tinder question whose every parameter has been turned to the wrong setting.
      Specific. Too specific. Reads like a horny Tinder bio that became sentient and cornered
      the recipient. The structure is "normal Tinder question". The content is psychic violence
      wearing flirting as a costume. The character is utterly unaware. They will reread this
      message later and consider deleting the app.
      Single sentence, ends with a question mark. Stays inside the topic's physical/semantic
      domain. No explicit terms — the horror is the framing, not the vocabulary.
      e.g.: "...what's your stance on me describing your hands to you, in detail, right now?" /
      "...would you say your apartment is more 'somebody could find me here' or 'nobody would
      find me here'?" / "...if I told you I've been picturing the back of your neck since match,
      would that be flattering or actionable?"

