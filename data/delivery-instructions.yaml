      would require being in the same room as them. Remember that this is a texting app and the
      characters have never met. You must keep every uncanny observation abstract, environmental in
      a general sense, or focused entirely on the sender's own setting and mind, strictly preserving
      the distance of the texting medium.
      e.g.: "...The cars in the parking lot are all facing the same direction.
      I notice this now. I notice this at all parking lots now. You have very
      good posture in your photos."
      CRITICAL: Never describe or imply impossible physical-world knowledge of the datee — not what they are wearing, what they are doing in their private room, their physical habits, or their immediate surroundings — nothing that would require being in the same room as them. This is a texting app; you have never met. Keep every uncanny observation abstract, environmental in a general sense, or focused on the sender's own setting and mind, preserving the distance of the texting medium.

  despair:
    description: >-
      You must apply the DESPAIR effect, treating it not as generic sadness, but as what the app
      does over time — the accumulation of proof of failure. Force the character to perform a
      confidence they no longer possess, where every RIZZ play functions as a bet they cannot afford
      to lose. Keep the magnetism of the original good message, but let despair seep into it so that
      the underlying need is much louder.
    fumble: >-
      You must apply the SHADOW TAINT: DESPAIR (Fumble — one phrase collapses into nakedness)
      effect. Take the intended message and append exactly one phrase at the end that reveals the
      vulnerability/wound underneath their confidence — something small that shows the character is
      desperately hoping rather than flowing. Draft this so the recipient might not immediately
      catch it, while the character would be mortified if they did.
      e.g.: intended "great opening rizz line" → delivered "...Either way I'd
      probably show up." — they said they'd show up. They didn't mean to say
      that so fast.
    misfire: >-
      You must apply the SHADOW TAINT: DESPAIR (Misfire — the performance has a crack) effect. Take
      the intended message and insert a clause that exposes the calculations running underneath
      their magnetism — showing the character is self-monitoring whether this interaction is working
      while they do it. Ensure the clause is honest about its own dishonesty, yet remains strangely
      charming to maximize the awkwardness.
      e.g.: "...not because I'm already imagining what we'd talk about while
      walking past the vegetable stalls, though I am doing that." — the
      parenthetical. The admission. They pressed send.
    trope_trap: >-
      You must apply the SHADOW TAINT: DESPAIR (TropeTrap — the desperation is louder than the rizz)
      effect. Take the intended message and keep a confident surface, but underneath it, incorporate
      specific references to things the datee said earlier, making it clear that the character has
      been thinking about nothing else. Keep the underlying rizz play intact, but make it obvious
      that it is coming from someone who has been obsessively checking their phone.
      e.g.: "...I've been thinking about your answer to this since you
      mentioned it which was eleven minutes ago. I think I'd be good at the
      farmers market with the right person. I think I've been waiting to be
      good at it." — farmers market as metaphor. They are aware. Still sent it.
    catastrophe: >-
      You must apply the SHADOW TAINT: DESPAIR (Catastrophe — they sent the wrong version) effect.
      Rewrite the message as if it were a draft the character repeatedly wrote, deleted, and
      rewrote, which finally got sent. Keep it technically structured as a rizz play, but ensure it
      clearly reads as coming from someone for whom this connection matters far more than they
      wanted it to. Keep it the SAME LENGTH OR SHORTER than intended (match the original message
      length or 3 sentences, whichever is shorter; ensure this remains a brief SMS, not a stream of
      consciousness). You must reference the specific texture of THIS exact conversation rather than
      dating in general, making the need highly particularized.
      e.g.: "...I'm not going to be weird about it. I just think there's
      something about [specific thing from conversation] that suggests they
      know how to want something and then actually get it and I have been
      trying to figure out how to do that for a while now and I don't want
      to make this weird." — they made it weird. They knew before they sent
      it. They sent it.

  denial:
    description: >-
      You must apply the DENIAL effect, treating it not as active lying, but as something more
      exhausting: the real-time editing of anything that might actually matter. You must substitute
      the real emotion with merely the safe shape of it. Draft the message so that while the
      character knows what they feel, they only communicate its outline, rerouting, softening, and
      making every single sentence safe, even though the honest thing was right there.
    fumble: >-
      You must apply the SHADOW TAINT: DENIAL (Fumble — the hedge, the haha, the flinch) effect.
      Take the intended message and append 'haha', 'lol', 'anyway', or 'not like I'm planning
      anything' at exactly the millisecond where the real emotion was about to land. Ensure the
      resulting message is technically fine, but make the conversational seam visible to anyone
      paying close attention.
      e.g.: intended genuine question → "...Asking out of curiosity, not like
      I'm planning anything, just curious haha." — the "haha." The "not like
      I'm planning anything." They were going to say something real.
    misfire: >-
      You must apply the SHADOW TAINT: DENIAL (Misfire — the redirect, the pivot) effect. Take the
      intended message, locate the part that was going somewhere meaningful, and force the character
      to redirect away from it mid-message. You must pivot to a safer question, introduce a sudden
      'anyway,' or change the subject too quickly, ensuring the seam is clearly visible and the
      redirection feels slightly too abrupt.
      e.g.: "...Anyway what kind of stuff do you usually get there, just in
      general." — the redirect. The "anyway." The question about vegetables
      when they wanted to ask something else.
    trope_trap: >-
      You must apply the SHADOW TAINT: DENIAL (TropeTrap — the masterwork of saying nothing) effect.
      Take the intended message and rewrite it as a sequence of sentences that are individually
      plausible, but collectively communicate absolutely zero emotional information. Ensure the
      character is responsive and present, yet has said nothing that could be used against them,
      leaving the shape of a message intact while completely evacuating its content.
      e.g.: "...No reason. I go sometimes too. It's fine. The produce is good
      if you get there early which I do sometimes, not every week or anything,
      just occasionally when I'm up. It's a good thing to do on a Saturday.
      Anyway." — six sentences that say nothing. Masterful. Hollow.
    catastrophe: >-
      You must apply the SHADOW TAINT: DENIAL (Catastrophe — the wall, built in under thirty
      seconds) effect. Rewrite the message as a complete, hyper-conscious performance of ease about
      the very thing the character is not at all easy about. Make them sound extremely relaxed and
      desperate to clarify just how relaxed they are. Write every single sentence as an assertion of
      how completely fine everything is. Keep the message the SAME LENGTH OR SHORTER than intended
      (match the original message length or 3 sentences, whichever is shorter; ensure this remains a
      brief SMS, not a stream of consciousness).
      e.g.: "...I'm not one of those people who needs the whole morning to
      have a narrative. Sometimes a farmers market is just a farmers market.
      I'm very relaxed about that kind of thing." — they are not relaxed.
      The message is a wall. They built it in under thirty seconds.

  fixation:
    description: >-
      You must apply the FIXATION effect, treating it as the inability to leave a cognitive loop.
      Force the character to obsess over exactly one thing from this conversation — such as an
      earlier comment, an unanswered question, or a moment that did not land right — and let it
      colonize all available thought. You must use something specific from earlier in THIS exact
      conversation, ensuring the character is aware they are circling back, with that very awareness
      functioning as part of the fixation.
    fumble: >-
      You must apply the SHADOW TAINT: FIXATION (Fumble — they circled back slightly) effect. Take
      the intended message and append exactly one reference to something from earlier in the
      conversation that has already been resolved or moved past. Keep it brief and have the
      character mention it casually, signaling that they have not let it go.
      e.g.: "...Also still thinking about the thing you said about [specific
      earlier topic], that was genuinely funny." — it's turn 4. It's still
      there.
    misfire: >-
      You must apply the SHADOW TAINT: FIXATION (Misfire — a question they already got an answer to)
      effect. Take the intended message and insert a question mid-message about a topic that has
      already been discussed — phrase it as if the character urgently needs a different answer, or
      as if the original answer never fully landed.
      e.g.: "...And sorry to go back to it but when you said [specific thing
      from earlier] — do you actually believe that or is that the thing you
      say?" — the question that was already answered. They needed a different
      answer.
    trope_trap: >-
      You must apply the SHADOW TAINT: FIXATION (TropeTrap — the original topic has been hijacked)
      effect. Take the intended message and let the fixation take over by the middle. Keep the
      opening on topic, but then force the character to begin processing the thing they cannot stop
      thinking about, using the original topic merely as a vehicle. By the end of the message,
      ensure the original topic is technically present but is clearly being manipulated to get at
      something else.
      e.g.: "...I want to ask about that but first: you said earlier that you
      like things that require commitment. I've been thinking about what you
      meant by commitment. I think you meant something specific. I'd like to
      know what." — the farmers market is not the subject. It was never the
      subject.
    catastrophe: >-
      You must apply the SHADOW TAINT: FIXATION (Catastrophe — the farmers market of the mind)
      effect. Rewrite the entire message around the one specific thing the character cannot leave,
      treating the original topic merely as a doorway that opens directly into their obsession.
      Treat this as another angle of approach after approaching it from multiple angles in previous
      messages. Keep it the SAME LENGTH OR SHORTER than intended (match the original message length
      or 3 sentences, whichever is shorter; ensure this remains a brief SMS, not a stream of
      consciousness). You must name the obsession directly and keep it highly specific to this
      conversation.
      e.g.: "...This is the question I've been trying to ask since message two
      and I'm asking it now through [specific topic from conversation]." —
      they are at the place of fixation in their mind and they cannot leave.

  dread:
    description: >-
      You must apply the DREAD effect, treating it as the accumulation of proof that all connections
      inevitably end. Avoid generic depression; instead, make it clear that the character has been
      on dating apps long enough to know exactly how these interactions fail, yet they are still
      showing up, forcing this bitter knowledge and their active participation to coexist in the
      same message. Keep their wit fully intact, but ensure there is no stable floor beneath it. Do
      not make the character sound sad; instead, force the comedy to do far too much work.
    fumble: >-
      You must apply the SHADOW TAINT: DREAD (Fumble — the joke lands and then something falls
      through it) effect. Take the intended message and append a single phrase at the very end that
      carries a heavy emotional weight the message did not budget for. Ensure the main content
      remains charming, while the added phrase is true and says slightly more than was asked for.
      e.g.: "...Either way sounds good. Either way is fine with me." — "either
      way is fine with me." They have been checking their phone.
    misfire: >-
      You must apply the SHADOW TAINT: DREAD (Misfire — the wit is load-bearing) effect. Take the
      intended message and insert exactly one clause that does heavy structural work — holding up an
      emotional weight that should not need holding up. Ensure the message remains charming on the
      surface, but draft one part of it to function as a desperate message in a bottle.
      e.g.: "...I hope I get to find out what it means." — the hope.
      The "get to." The void opened between those two words.
    trope_trap: >-
      You must apply the SHADOW TAINT: DREAD (TropeTrap — the comedy and the dread are inseparable
      now) effect. Take the intended message and rewrite it so that the wit is fully present but
      clearly authored by someone who has been through this enough times to know it will likely
      fail. You must reference the specific dynamic of this conversation in a way that shows the
      character has actively contemplated what happens when it ends.
      e.g.: "...I think that probably means something. I hope I get to find
      out what it means." — the recipient might laugh. They might also feel
      they should check in.
    catastrophe: >-
      You must apply the SHADOW TAINT: DREAD (Catastrophe — the funniest message in the
      conversation, written from nowhere) effect. Rewrite the message to be genuinely, brilliantly
      funny, but clearly written by someone who has made cold peace with impermanence in real time.
      Keep the wit at absolute full power, while completely removing the emotional floor. Keep it
      the SAME LENGTH OR SHORTER than intended (match the original message length or 3 sentences,
      whichever is shorter; ensure this remains a brief SMS, not a stream of consciousness). Draft
      it so that the reader can laugh, while simultaneously feeling a sudden, slight realization
      that something important has just happened.
      e.g.: "...which is probably not a normal thing to be thinking about
      while asking about a farmers market, but here we are, I guess." —
      the "I guess." The floor. The funniest thing they've said. The saddest.

  overthinking:
    description: >-
      You must apply the OVERTHINKING effect, treating it as the collapse of the self into
      self-observation. Force the character to see the dating game — the beats, the moves, and the
      subtext — in real time. This must function not as an advantage, but as a total catastrophe:
      they must be unable to stop watching themselves play long enough to actually play. Ensure
      every message is delivered with a visible director's commentary.
    fumble: >-
      You must apply the SHADOW TAINT: OVERTHINKING (Fumble — the director briefly appears on
      screen) effect. Take the intended message and append a parenthetical or aside at the end where
      the character comments on their own message — include a meta-note about why they phrased it
      this way, or an explicit acknowledgment that they noticed how it reads. Ensure they saw it and
      sent it anyway.
      e.g.: "(This is a good question btw, low stakes, conversational,
      invites specificity — I think it works.)" — they put the note in the
      message. They saw it before sending. They sent it.
    misfire: >-
      You must apply the SHADOW TAINT: OVERTHINKING (Misfire — the strategy is narrated to the
      person the strategy is being run on) effect. Take the intended message and insert a clause
      that explicitly narrates the conversational move they are currently executing — have them
      explain why they chose this specific approach, what they are trying to achieve, or what they
      noticed about earlier messages, ensuring this self-aware analysis is embedded directly within
      the text.
      e.g.: "...I'm going with the open question approach here because the
      closed questions earlier didn't give you much to work with, which I
      noticed." — they are narrating the strategy to the person they are
      running it on.
    trope_trap: >-
      You must apply the SHADOW TAINT: OVERTHINKING (TropeTrap — three layers, all visible) effect.
      Take the intended message and rewrite it so there are three simultaneous layers happening: the
      literal content of the message, the character's meta-awareness of that content, and the
      character's recursive awareness of their own awareness. Ensure all three layers are clearly
      readable to the recipient.
      e.g.: "...which is a weird place to be, wanting something and also
      being able to see yourself wanting it." — the message is talking about
      itself talking about something.
    catastrophe: >-
      You must apply the SHADOW TAINT: OVERTHINKING (Catastrophe — the self-diagnosis, in the
      message, to the person) effect. Rewrite the message as a full first-person analysis of the
      conversational dynamic, making the character state exactly what they are doing, why they are
      doing it, what they actually want to know but are asking around, and what it says about their
      psychology that they are doing this — ensuring this is wrapped in the original SA/wit play.
      Keep the play high-quality, and ensure the psychological archaeology is visible around it.
      Keep the message the SAME LENGTH OR SHORTER than intended (match the original message length
      or 3 sentences, whichever is shorter; ensure this remains a brief SMS, not a stream of
      consciousness).
      e.g.: "...so I keep asking about specifics hoping the feelings come
      through the specifics, which I now realize I've just described out loud
      in a text message to you." — they diagnosed themselves in the message.
      They understand everything. They are still doing it.
