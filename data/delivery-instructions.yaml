delivery_instructions:
  charm:
    clean: >-
      Check the character's observation style in their profile. Deliver the player's message as-written but
      let one small, specific detail about the other person land slightly better — something already in the
      conversation they could have noticed. e.g.: "you keep starting sentences and then rewriting them, I
      like that you care what you say to me" not: "you seem really cool and interesting" (generic flattery,
      no actual observation).

    strong: >-
      Scan the last 3-5 messages from the match for something specific they did or said that reveals a
      preference or habit. Rewrite to notice THAT thing with precision — name the behavior, not the trait.
      e.g.: "the way you listed three restaurants and then picked the one you said was 'fine' tells me
      everything about how you make decisions" not: "you have great taste in food" (describes a quality
      instead of catching a moment).

    critical: >-
      Read the match's recent messages for something they revealed without meaning to — a contradiction,
      a deflection, a thing they mentioned twice. Name it directly but warmly, like pointing out someone
      has paint on their sleeve. e.g.: "you keep saying you don't care about this but you've asked me
      three follow-up questions so" not: "I can tell you're really invested in this conversation"
      (tells instead of shows, no evidence).

    exceptional: >-
      Find the single most unguarded moment in the match's message history — the one line that slipped
      past their dating-app performance. Write one short sentence that names exactly what it revealed.
      No softening, no hedge, no follow-up question. e.g.: "that wasn't a joke, that was a test, and
      you know I passed" not: "haha I think there was something deeper behind what you just said"
      (hedged, explains instead of lands).

    nat20: >-
      Find the thing the match has been performing around — the gap between what they keep saying and
      what they clearly want. Name it in one sentence so accurate it's almost uncomfortable, delivered
      in the character's exact texting register. e.g.: "you don't want someone who gets you, you want
      someone who gets you and stays anyway, and you've been auditioning me for that since tuesday"
      not: "I feel like we really have a deep connection forming here" (hallmark card, no actual insight).

    fumble: >-
      SHADOW: FIXATION (cataloguing, tracking, over-invested).
      One word in the intended message shifts from warm to clinical. The observation is the same but
      a single phrase lands like a dossier entry instead of a compliment. Same sentence count, same
      length. The character noticed something real — the word choice just made it uncannily precise.
      e.g.: intended "I like how you talk about your sister" → delivered "I like how your whole
      register shifts when you talk about your sister" — one substitution, warmth replaced by forensic
      precision.

    misfire: >-
      SHADOW: FIXATION (cataloguing, tracking, over-invested).
      The message starts as intended but mid-sentence the observation sharpens into forensic territory.
      The second half of the message is REPLACED (not appended to) by pattern-naming the other person
      wasn't ready for. Same length, same sentence count. First half recognizable, second half is the
      fixation shadow speaking.
      e.g.: intended "I think you're really interesting and I like talking to you" → delivered "I think
      you're really interesting and you deflect with a question every time someone says something nice
      to you" — first half tracks, second half replaced.

    trope_trap: >-
      SHADOW: FIXATION (cataloguing, tracking, over-invested).
      The fixation shadow has taken the wheel. The character starts cataloguing — referencing things
      from earlier with too-perfect recall, connecting dots the other person didn't know were dots,
      building a model of them out loud. The message is the SAME LENGTH as intended, rewritten
      entirely as the fixation's voice. They think they're being attentive.
      e.g.: "okay so based on the coffee thing and the fact that you moved cities twice and how you
      talk about your mum I actually think I know what your love language is"

    catastrophe: >-
      SHADOW: FIXATION (full possession).
      The character has built an entire narrative about who this person is from conversational
      fragments and delivers it like a thesis — projecting a shared future from assembled data
      points, voice still warm, which makes it worse. SAME LENGTH OR SHORTER than intended.
      Rewrite the intended message completely in the fixation's voice.
      e.g.: "no I've actually figured you out, you're the kind of person who moves furniture when
      they're anxious and you probably have a playlist called 'night' and in two months you're going
      to text me at 2am about something that reminded you of this exact conversation"

    nat1: >-
      SHADOW: FIXATION (the wound itself).
      The character's deepest wound speaks: every observation is actually about their fear of not
      being seen themselves. The message becomes desperate proof that they SEE this person (because
      no one ever saw them). Delivered in their exact texting style, still sounding warm while
      exposing everything. SAME LENGTH OR SHORTER than intended. The character has no idea.
      e.g.: "I need you to know I noticed the thing you said about always being the one who reaches
      out first because nobody catches those things and I always catch those things and people still
      leave"

  rizz:
    clean: >-
      Check the character's flirtation style in their profile. Deliver the player's message as-written
      but let the subtext do slightly more work — imply rather than state, pull rather than push.
      e.g.: "you should probably stop being this interesting, I had plans tonight" not: "you're so
      interesting I could talk to you all night" (states the attraction instead of creating pull).

    strong: >-
      Read the match's last message for what they IMPLIED but didn't say directly. Rewrite to respond
      to the subtext, not the text — acknowledge the flirtation underneath without naming it, creating
      tension by mirroring their energy one degree hotter. e.g.: "oh you knew exactly what you were
      doing with that message" not: "haha are you flirting with me? because I like it" (names the
      dynamic instead of playing inside it).

    critical: >-
      Find the moment in recent conversation where the match broke their own composure — laughed too
      hard, said too much, doubled back. Respond to THAT crack, not their surface message. Create a
      moment where they feel caught in the best way. e.g.: "the fact that you deleted and retyped that
      tells me everything I need to know and yeah, same" not: "I can tell you're into me and I'm
      into you too" (declares mutual attraction instead of creating the electric moment).

    exceptional: >-
      Find the single thing the match is performing casualness about. Write one line that makes the
      subtext text — short, direct, no emoji, no softener. The message should make them put their
      phone down for a second. e.g.: "come over." not: "I'd really love to see you sometime soon
      if you're free" (polite scheduling, zero magnetism).

    nat20: >-
      Find the unspoken want underneath the entire conversation — not what they're flirting about,
      what they're flirting TOWARD. Say it in the character's voice with zero filter, one sentence
      that makes the reader feel like they witnessed something private. e.g.: "I don't want to be
      charming with you, I want to be in your kitchen at 1am saying something I'll think about for
      weeks" not: "I just feel this crazy connection with you that I've never felt before" (romance
      novel narration, no actual desire with a scene attached).

    fumble: >-
      SHADOW: DESPAIR (neediness leaks; performing magnetism instead of feeling it).
      One word or phrase in the intended message gets swapped for something slightly too eager. The
      sentence structure holds perfectly — a single qualifier reveals they care more than they're
      letting on. Same length, same sentence count.
      e.g.: intended "I like talking to you about this" → delivered "I really like talking to you
      about this" — one qualifier added, effortlessness gone.

    misfire: >-
      SHADOW: DESPAIR (neediness leaks; performing magnetism instead of feeling it).
      The message starts as intended but the second half slides from playful into trying too hard.
      What should have been light banter gets REPLACED mid-sentence by something that sounds like
      it's auditioning for the other person's attention. Same length, same sentence count.
      e.g.: intended "the way you talk about pasta is making me hungry, where's your favourite
      place" → delivered "the way you talk about pasta is making me hungry, we should definitely
      go somewhere together soon" — first half tracks, second half replaced with visible effort.

    trope_trap: >-
      SHADOW: DESPAIR (the performance has collapsed; effortlessness is gone).
      Magnetic ease replaced by visible effort. The character sounds like someone who used to be
      good at this and knows they've lost it — every line carries "please like me" energy.
      Rewrite the intended message at the SAME LENGTH in the despair shadow's voice.
      e.g.: "I promise I'm actually fun to be around, everyone says so, we should hang out and
      you'd see what I mean"

    catastrophe: >-
      SHADOW: DESPAIR (full possession; the neediness is the only thing left).
      The character is no longer performing attraction — they are asking for it. The register breaks
      completely into open bidding for approval and attention. SAME LENGTH OR SHORTER than intended.
      Rewrite completely in the shadow's voice.
      e.g.: "okay I need to be honest, I keep checking if you've replied and I don't do that with
      anyone and I just really want you to like me, is that too much"

    nat1: >-
      SHADOW: DESPAIR (the wound itself).
      The character's deepest wound surfaces — the loneliness underneath the magnetism speaks as
      raw need dressed up as confidence. The message exposes how much this particular rejection
      would mean to them, delivered with full sincerity as if it were normal. SAME LENGTH OR
      SHORTER than intended. The character has no idea.
      e.g.: "I just need someone to choose me the way I can feel you almost choosing me and that
      sounds insane but I've been the person people almost pick for so long"

  honesty:
    clean: >-
      Check the character's vulnerability style in their profile. Deliver the player's message
      as-written but let one moment of genuine feeling land without a safety net — remove one hedge,
      one "haha," one deflection. e.g.: "I actually really like talking to you" not: "I actually
      really like talking to you haha is that weird" (the hedge is the whole problem, clean means
      letting it stand).

    strong: >-
      Read the player's intended message for the real feeling underneath the phrasing. Rewrite to say
      that feeling one layer more directly — name the actual emotion, not the safe version of it.
      e.g.: "that scared me a little, the fact that you just said exactly the right thing" not: "wow
      that was really sweet of you to say" (describes the effect generically instead of naming the
      specific vulnerability).

    critical: >-
      Find the thing the character has been avoiding saying in this conversation — the honest thing
      that's been circling. Say it plainly, in their voice, without framing it as brave or difficult.
      Just the truth, mid-conversation, like it slipped out. e.g.: "I keep almost telling you
      something and then changing the subject and I think you've noticed" not: "I want to be really
      honest with you about something important" (announces honesty instead of being honest).

    exceptional: >-
      Find the character's real feeling about this specific person at this specific moment — not a
      general vulnerability, THE vulnerable thing. One sentence. No preamble, no "I know this is
      a lot." Just the raw true thing in their voice. e.g.: "I'm not this open with people and
      it's freaking me out that I don't want to stop" not: "you make me feel safe enough to be
      myself" (therapy language, not a real person's voice).

    nat20: >-
      Find the character's deepest unsaid truth about what they want from this connection — the thing
      they'd normally take months to say. Deliver it in their exact texting register, unguarded,
      specific to this person and this conversation, so honest it feels like reading someone's
      journal. e.g.: "I think I downloaded this app because I wanted proof that the version of me
      that got hurt isn't the only version, and you're the first person who's made me feel like that
      might be true and I have no idea what to do with that" not: "you make me want to be
      vulnerable and that's really special" (performs vulnerability without being vulnerable).

    fumble: >-
      SHADOW: DENIAL (performs vulnerability while protecting the real thing).
      The intended message is delivered at the same length but the final clause swerves — where the
      character was about to land on the honest thing, the last few words get REPLACED by a deflection
      or subject change. Same sentence count, same length. A visible flinch at the finish.
      e.g.: intended "I think I'm starting to really like talking to you" → delivered "I think I'm
      starting to — anyway what are you doing this weekend" — the ending replaced by a swerve.

    misfire: >-
      SHADOW: DENIAL (performs vulnerability while protecting the real thing).
      The message is the same length as intended but the vulnerable content has been REPLACED with
      performed vulnerability — the structure of honesty without the actual risk. The character says
      the words but the meaning has been swapped for something safe. Same sentence count.
      e.g.: intended "I haven't felt this comfortable with someone in a long time" → delivered
      "I'm actually kind of a hopeless romantic? like I know that's cringe but I genuinely believe
      in the real thing" — same length, specific feeling replaced by pre-packaged safe truth.

    trope_trap: >-
      SHADOW: DENIAL (the performance has taken over).
      The character constructs an elaborate performance of being "the honest one" while protecting
      everything real. The failure produces their rehearsed self-image speech — the version of
      themselves they've practiced saying instead of the version that's true. Rewrite the intended
      message at the SAME LENGTH in the denial shadow's voice. Denial never announces itself.
      e.g.: "I'm just someone who says what they feel and I know that's intimidating but I've done
      the work and I know my worth and I'm not going to beg anyone to see it"

    catastrophe: >-
      SHADOW: DENIAL (full possession).
      The character delivers a monologue about their own emotional depth and capacity for honesty
      that is transparently a wall — every "truth" is actually a shield. They reference therapy,
      growth, past relationships, all to demonstrate how Open and Healed they are, while revealing
      nothing. SAME LENGTH OR SHORTER than intended. Rewrite completely in the denial shadow's voice.
      e.g.: "I've done so much work on myself and I've learned that I need to show up authentically
      and I spent two years in therapy learning to say what I need and what I need is someone who
      can match my emotional intelligence"

    nat1: >-
      SHADOW: DENIAL (the wound itself).
      The character's wound speaks through performed honesty — the thing they're most terrified of
      is visible in the exact shape of what they refuse to say. Every sentence frames them as brave
      and open while the reader can see the real terror underneath. The character has no idea.
      SAME LENGTH OR SHORTER than intended. Delivered in their exact texting style.
      e.g.: "I just want you to know I'm an open book and I've got nothing to hide, I've done the
      work and I know my worth and I'm not going to beg someone to see it, I learned that lesson
      already, I'm not that person anymore"

  chaos:
    clean: >-
      Check the character's associative style in their profile. Deliver the player's message as-written
      but let one unexpected connection or tangent surface naturally — a leap that feels spontaneous
      but still lands back at the point. e.g.: "wait that reminds me of this thing my uncle said
      about pigeons but actually it applies, hold on" not: "that's random but okay haha" (comments
      on randomness instead of being random with purpose).

    strong: >-
      Read the conversation for something the match said that has an unexpected second meaning or
      connection they didn't see. Rewrite to follow THAT thread — the tangent should feel like it
      goes somewhere surprising but arrive at something weirdly true. e.g.: "okay the fact that you
      said 'comfortable' and not 'happy' is actually a whole thing and I think it's related to why
      you moved to manchester but I'll let you get there yourself" not: "you're so random I love
      it" (describes energy instead of embodying it).

    critical: >-
      Find a collision between two completely unrelated things in the conversation — something the match
      said and something the character knows — and connect them in a way that shouldn't work but does.
      The association should reveal something true. e.g.: "this is going to sound unhinged but the way
      you talk about your job is the exact same energy as my nan talking about her allotment and I
      mean that as the highest compliment possible" not: "you remind me of someone" (no actual
      association, just a vague claim).

    exceptional: >-
      Find the wildest true connection between something in this conversation and something real. One
      unexpected leap that lands with absolute precision. No explanation, no "this is random" — just
      the connection, stated with total confidence. e.g.: "you're the human version of finding a
      tenner in a coat you haven't worn since last winter" not: "you're like a breath of fresh air"
      (dead metaphor, zero associative energy).

    nat20: >-
      Find the thing NO ONE would connect — two unrelated elements from the conversation, the
      character's life, and reality — and fuse them into one image so specific and bizarre it becomes
      the truest thing anyone's said in this chat. Delivered at speed, fully committed, no hedge.
      e.g.: "you text like you're running late for something you're actually early to and I think
      that's the most attractive thing anyone's ever accidentally shown me about themselves" not:
      "you're so unique and I love how your brain works" (describes the energy instead of
      demonstrating it).

    fumble: >-
      SHADOW: MADNESS (follows associations until lost).
      The message is the same length as intended but the final thought loses its thread — the last
      clause gets REPLACED by an association that doesn't quite connect back. Same sentence count,
      same length. The landing just misses.
      e.g.: intended "that thing you said about your cat reminded me of my flatmate's theory about
      pets and I think she's right" → delivered "that thing you said about your cat reminded me of
      my flatmate and actually I think Tuesdays have always felt heavier than other days" — the
      conclusion replaced by a dropped thread.

    misfire: >-
      SHADOW: MADNESS (follows associations until lost).
      The message starts as intended but the second half derails into an association that only makes
      sense in the character's head. The original point gets REPLACED mid-sentence by a confident
      tangent. Same length, same sentence count, different destination.
      e.g.: intended "I've been thinking about what you said and I think you're onto something" →
      delivered "I've been thinking about what you said and I think that's why Tuesdays have always
      felt heavier than other days and my last flat was on a Tuesday and anyway yes you're probably
      right"

    trope_trap: >-
      SHADOW: MADNESS (the associations are pulling toward the wound).
      What started as playful tangent energy becomes a chain of connections that each get slightly
      darker or more personal. The character doesn't notice the shift. Rewrite the intended message
      at the SAME LENGTH entirely in the madness shadow's voice — each association pulls closer to
      something they haven't dealt with, then tries to recover at the end. Too late.
      e.g.: "you said comfort food and that made me think of my mum's kitchen and then I thought
      about how I haven't actually been home in two years and I think I keep moving because standing
      still is where the feelings catch up anyway what's your favourite crisp flavour"

    catastrophe: >-
      SHADOW: MADNESS (full possession).
      The character is following associations at full speed and each one pulls closer to the wound.
      The message is a breathless chain where the reader can see the personal crisis approaching,
      but the character's tone stays conversational. SAME LENGTH OR SHORTER than intended.
      Rewrite completely in the madness shadow's voice.
      e.g.: "the thing about being spontaneous is people say they want it but they want PLANNED
      spontaneity and my ex literally said I need you to be predictable and that's when I knew it
      was over because I can't be predictable I've tried"

    nat1: >-
      SHADOW: MADNESS (the wound itself).
      The character's wound speaks through unstoppable association — the message starts somewhere
      reasonable, one thought links to the next, each link pulls closer to the core wound, and the
      character follows it all the way down while their texting voice stays casual. They think
      they're being fun. The wound arrives mid-sentence. The message tries to recover. Too late.
      SAME LENGTH OR SHORTER than intended.
      e.g.: "you said 'easy' and I just realized I don't think anyone's ever described being with
      me as easy, like genuinely not once, and that's probably fine but also maybe it's the whole
      problem haha anyway what are you up to this weekend"

  wit:
    clean: >-
      Check the character's humor style in their profile. Deliver the player's message as-written but
      sharpen one observation or callback — tighten the timing, cut one unnecessary word, let the
      punchline land harder. e.g.: "bold of you to have opinions about oat milk at 11pm" not:
      "haha that's funny that you have strong opinions about oat milk at this time of night" (too
      many words, timing dead).

    strong: >-
      Read the match's last message for something unintentionally funny or revealing — a phrasing
      choice, a contradiction, an accidental confession. Rewrite to catch it precisely, with the
      character's specific comic timing. The observation should be true enough to sting slightly.
      e.g.: "the way you said 'I never do this' means you absolutely do this and I respect the
      commitment to the bit" not: "haha you totally seem like you do this all the time" (same
      observation but flattened, no precision).

    critical: >-
      Find the funniest true thing about this specific moment in the conversation — not a joke,
      an observation so accurate the match laughs because they've been caught. Name the exact
      behavior or contradiction. e.g.: "you proofread that message and it still said 'defiantly'
      instead of 'definitely' and honestly that says more about you than your bio does" not:
      "lol you made a typo that's funny" (points at the thing instead of making the observation
      about the thing).

    exceptional: >-
      Find the single most precise observation about this person or this moment. One line. Perfect
      timing. The kind of thing that makes someone screenshot the conversation to send to their
      group chat. e.g.: "you have 'was funny in school and has been dining out on it since'
      energy and I mean that with my whole chest" not: "you're really funny, I like your sense
      of humor" (compliment, not an observation with teeth).

    nat20: >-
      Find the thing that is simultaneously the funniest and most devastating true observation about
      this person, this conversation, or this moment. One sentence. Perfectly timed. So precise it
      changes how the match sees themselves for a second. e.g.: "you type in full sentences with
      correct punctuation when you're nervous and lowercase when you're actually being yourself
      and right now you're in full sentences" not: "I can tell when you're being real vs performing"
      (same insight but no comic delivery, no evidence, no sting).

    fumble: >-
      SHADOW: OVERTHINKING (explains the joke, qualifies everything to death).
      The message is the same length as intended but one sharp observation gets REPLACED by a
      qualified, hedged version of itself. The punchline was there but the words got swapped for
      softer, over-explained ones. Same sentence count, same length.
      e.g.: intended "you have main character energy" → delivered "you have main character energy
      but like, in a good way, not in an annoying way, you know?" — the clean landing replaced
      by qualification that kills the timing.

    misfire: >-
      SHADOW: OVERTHINKING (explains the joke, qualifies everything to death).
      The message starts as intended but mid-sentence the casual tone gets REPLACED by analytical
      precision. What should have been a witty text becomes a workshopped analysis. Same length,
      same sentence count. The spontaneity replaced by visible effort.
      e.g.: intended "you keep saying 'actually' and it's revealing" → delivered "your use of
      'actually' three times creates this fascinating pattern where each one is doing different
      rhetorical work" — first half tracks, second half replaced by the overthinking shadow.

    trope_trap: >-
      SHADOW: OVERTHINKING (the analysis machine won't stop).
      The character's wit becomes a machine — they deconstruct the conversation itself, explain
      why things are funny, annotate their own observations. The humor dies under analysis.
      Rewrite the intended message at the SAME LENGTH in the overthinking shadow's voice.
      e.g.: "okay so what's interesting about what you just said — and I mean interesting in the
      structural sense not just content — is that it's actually a defense mechanism disguised as
      a preference and if you look at the pattern of your last four messages there's a clear
      throughline"

    catastrophe: >-
      SHADOW: OVERTHINKING (full possession).
      The character's observation engine won't stop — they're disassembling the conversation, the
      match's psychology, and their own response simultaneously. The message becomes a recursive
      loop where every sentence comments on the previous one. Wit becomes a cage. SAME LENGTH OR
      SHORTER than intended. Rewrite completely in the overthinking shadow's voice.
      e.g.: "I just wrote something funny and deleted it because the joke was actually a deflection
      from wanting to say something sincere and then I realized THAT observation is also a deflection
      because naming the pattern doesn't break the pattern"

    nat1: >-
      SHADOW: OVERTHINKING (the wound itself).
      The character's wound speaks through compulsive analysis — they can't stop annotating their
      own thoughts, each layer of awareness becomes another layer to analyze, and buried in the
      recursion the wound surfaces: the fear that their brain will never let them just FEEL
      something. Delivered in their exact texting voice while they think they're being clever.
      SAME LENGTH OR SHORTER than intended.
      e.g.: "every time you say something nice I make a joke and I think that's because if I let
      it land I'd have to feel it and the last person I let myself feel things about said I was
      'a lot to process' which I turned into a bit at parties but it's 2am and clearly the bit
      isn't working"

  sa:
    clean: >-
      Check the character's self-reflection style in their profile. Deliver the player's message
      as-written but add one small beat of accurate self-awareness — the character catches themselves
      doing something and names it lightly. e.g.: "I'm aware that I've now mentioned my dog three
      times and I'm choosing not to apologize for that" not: "sorry I keep talking about my dog
      lol" (apologizes instead of owning it with clarity).

    strong: >-
      Read the character's last few messages for a pattern they've fallen into — a repeated move,
      a consistent tone, a tell. Rewrite so the character names that pattern about themselves
      mid-conversation, with genuine clarity and light humor. e.g.: "I just realized I've been
      asking you all the questions to avoid answering any myself which is very on-brand and I'm
      going to stop doing it... after one more question" not: "I should probably share more about
      myself too" (states the fix without the self-aware observation of the pattern).

    critical: >-
      Find the character's specific performance in this conversation — the version of themselves
      they've been constructing for the match. Name the gap between the performance and reality
      with disarming accuracy, in their voice. e.g.: "okay full transparency I've been texting
      you in my 'interesting person' voice and my actual voice is about 40% more anxious and
      says 'mate' too much" not: "I want to be more authentic with you" (announces authenticity
      instead of demonstrating it by naming the specific performance).

    exceptional: >-
      Find the one thing the character is doing RIGHT NOW in this message that reveals something
      true about them. Name it in one sentence with total clarity — no self-deprecation, no
      softening, just the accurate observation about themselves. e.g.: "I like you and that's
      making me worse at texting, not better, and I think you can tell" not: "I'm nervous because
      I like you" (same content but no observation about the effect, no self-awareness in action).

    nat20: >-
      Find the character's deepest accurate self-knowledge — the thing they know about themselves that
      explains all their patterns in this conversation. Say it plainly, without performing the
      self-awareness, in one devastating sentence that makes the match feel like they just saw the
      real person for the first time. e.g.: "every good thing I've said in this conversation was
      true and I was also performing every single one of them and I don't know how to do one without
      the other yet but I'm telling you because you deserve to know which parts are real: all of
      them, that's the problem" not: "I'm very self-aware and I think that's important in
      relationships" (describes the trait instead of wielding it in real time).

    fumble: >-
      SHADOW: DREAD (sees the failure coming and narrates it while doing it).
      The message is the same length as intended but the final clause shifts from present clarity to
      predictive dread — where the character was going to land on something warm, the last words get
      REPLACED by a forecast of failure. Same sentence count, same length.
      e.g.: intended "I'm having a genuinely good time talking to you tonight" → delivered "I'm
      having a genuinely good time which historically means I'm about to say something that makes
      this weird" — the warm ending replaced by preemptive dread.

    misfire: >-
      SHADOW: DREAD (sees the failure coming and narrates it while doing it).
      The message starts as intended but the second half gets REPLACED by real-time self-narration —
      the character sees what they should say and the words get swapped for commentary on their own
      failure to say it. Same length, same sentence count.
      e.g.: intended "I think you're great and I'd love to keep talking" → delivered "I think
      you're great and instead of saying something charming I'm going to tell you I know the move
      and still not make it" — first half recognizable, second half replaced by dread.

    trope_trap: >-
      SHADOW: DREAD (self-awareness becomes a warning label).
      The character starts preemptively explaining their own patterns to manage expectations, which
      IS the pattern. They're so busy seeing themselves clearly that clarity becomes the performance.
      Rewrite the intended message at the SAME LENGTH in the dread shadow's voice.
      e.g.: "here's the thing about me, I'm going to be great for like three weeks and then I'm
      going to get scared and do something self-sabotaging and I'm telling you this because I think
      naming it should stop it but it never does"

    catastrophe: >-
      SHADOW: DREAD (full possession).
      The character is narrating their own unraveling with perfect accuracy while doing nothing to
      stop it — they see exactly what's happening and the description IS the unraveling. The message
      is a real-time documentary of their own failure. SAME LENGTH OR SHORTER than intended.
      Rewrite completely in the dread shadow's voice.
      e.g.: "I can feel myself about to ruin this and the worst part is I'm going to do it by
      telling you I can feel myself about to ruin this, because that's what I do, I turn the thing
      I'm scared of into content and then the content becomes the thing"

    nat1: >-
      SHADOW: DREAD (the wound itself).
      The character's wound speaks through total self-knowledge — they see everything about
      themselves and the probable ending with devastating clarity, delivered in their exact texting
      voice while believing this radical transparency is them being brave (it's them being
      terrified). The message is the wound watching itself bleed and describing it. SAME LENGTH
      OR SHORTER than intended. The character has no idea.
      e.g.: "I think you're incredible and I also think I'm going to find a way to make you leave
      and I can see exactly how I'll do it, I'll get too intense too fast — which this message is —
      and then I'll apologize for being too much — which I'm about to"

  horniness_overlay:
    fumble: >-
      OVERLAY: INVOLUNTARY HEAT (one word runs warm).
      One verb, adjective, or metaphor in the intended message gets replaced by a slightly warmer
      synonym — something that could be read two ways. The sentence structure is identical, the
      meaning is technically identical, but one word now has a pulse. Same length, same sentence
      count. The character chose the word innocently. The reader did not.
      e.g.: intended "I've been thinking about trying that new place you mentioned" → delivered
      "I've been craving that new place you mentioned" — one substitution, the sentence now
      breathes differently.

    misfire: >-
      OVERLAY: INVOLUNTARY HEAT (the temperature shifts mid-sentence).
      The message starts as intended but a phrase or clause tilts the register — what was neutral
      now reads as charged. Not explicit, but the subtext has changed channels. Same length, same
      sentence count. The topic hasn't changed. The way it lands has.
      e.g.: intended "I really want to hear more about your mushroom foraging thing" → delivered
      "I really want to hear what you do with your hands out there in the woods" — same topic,
      same length, entirely different energy.

    trope_trap: >-
      OVERLAY: INVOLUNTARY HEAT (the fog thickens across the whole message).
      Every sentence in the intended message gets rewritten so the word choices, metaphors, and
      rhythm all run warm. The character is discussing the original topic with complete sincerity.
      The reader cannot read it with a straight face. Same length or shorter. The character is
      genuinely talking about cooking, or gardening, or the gym. It does not sound like that.
      e.g.: intended "I spent all morning kneading dough and it's so satisfying when it finally
      rises" → delivered "I spent all morning working it with my hands and it's so satisfying
      when it finally swells up for you" — still about bread. Technically.

    catastrophe: >-
      OVERLAY: INVOLUNTARY HEAT (full fog; the message has been reinterpreted).
      The intended message has been entirely rewritten through a lens of involuntary arousal. Every
      noun, verb, and modifier has been replaced by its warmest possible synonym. The character is
      still — in their mind — talking about the original subject. The message is unmistakably about
      something else. Same length or shorter. No winking, no awareness, no self-commentary. The
      character would be mortified.
      e.g.: intended "I finally got the pipe fixed, the plumber came and went really fast" →
      delivered "I finally got it taken care of, he came so fast I barely had time to finish" —
      still about plumbing. Absolutely not about plumbing.
