    timing_range:
    - 1
    - 15
  outcome:
    delay_penalty: 0
- id: §5.response-delay.15–60-min
  section: §5
  title: Response Delay — 15–60 min
  type: interest_change
  description: '15–60 min: Slightly cool. -1 Interest if they were at 15+..'
