    - Combo: '**The Setup**'
      Sequence: Wit → Charm
      Bonus: +1 Interest on Charm
      Narrative logic: You made them laugh, then charmed them. The joke lowered their guard.
    - Combo: '**The Reveal**'
      Sequence: Charm → Honesty
